<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Claim</title>
  <link rel="stylesheet" href="{{ url_for('admin-static', path='admin.css') }}">
</head>
<body>
  <main class="content" style="max-width: 760px; margin: 0 auto; padding-top: 60px;">
    <section class="card hero">
      <h2 style="margin-top: 0;">{{ "Set Password" if token_type == "invite" else "Reset Password" }}</h2>
      {% if user %}
      <p class="subtle">{{ user.full_name or user.email }} · {{ user.email }}</p>
      {% else %}
      <p class="subtle">One-time password claim link</p>
      {% endif %}
      {% if error_message %}
      <div class="notice bad" style="margin-top: 16px;">{{ error_message }}</div>
      {% elif user %}
      <form class="stack" action="/admin/password/claim" method="post" style="margin-top: 18px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">
        <label>
          New password
          <input name="password" type="password" minlength="8" required>
        </label>
        <label>
          Confirm password
          <input name="password_confirm" type="password" minlength="8" required>
        </label>
        <div class="actions">
          <button type="submit">Save password</button>
        </div>
      </form>
      {% endif %}
    </section>
  </main>
</body>
</html>
