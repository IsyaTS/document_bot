<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('admin-static', path='admin.css') }}">
</head>
<body>
  <main class="content" style="max-width: 760px; margin: 0 auto; padding-top: 60px;">
    <section class="card hero">
      <h2 style="margin-top: 0;">Hermes Admin Login</h2>
      <p class="subtle">Minimal internal session-based access for owner/operator use. Login uses your existing user email and one internal access code.</p>
      {% if error_message %}
      <div class="notice bad" style="margin-top: 16px;">{{ error_message }}</div>
      {% endif %}
      <form class="stack" action="/admin/login" method="post" style="margin-top: 18px;">
        <input type="hidden" name="next" value="{{ next_path or '' }}">
        <label>
          User email
          <input name="email" type="email" value="{{ prefill_email or '' }}" placeholder="owner@hermes.local" required>
        </label>
        <label>
          Access code
          <input name="access_code" type="password" required>
        </label>
        <div class="actions">
          <button type="submit">Login</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
