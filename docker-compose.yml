services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_platform}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PLATFORM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-hermes_platform}
      PLATFORM_API_HOST: 0.0.0.0
      PLATFORM_API_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc
      "bash scripts/start_runtime_api.sh"
    ports:
      - "${PLATFORM_PUBLIC_API_PORT:-18000}:8000"
    volumes:
      - ./generated:/app/generated
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PLATFORM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-hermes_platform}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc
      "bash scripts/start_runtime_worker.sh"
    volumes:
      - ./generated:/app/generated
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/wait_for_db.py", "--timeout", "5", "--interval", "1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
